{% extends "base.html" %}

{% block content %}
<div class="login-container">
    <div class="animated-bg"></div>
    
    <div class="login-card">
        <div class="login-left">
            <div class="brand-icon"><i class="fas fa-crosshairs"></i></div>
            <h1 class="brand-title">UI BATTLE ARENA</h1>
            <p class="brand-subtitle">Where Code Meets Competition</p>
            
            <div class="stats-row" id="live-stats">
                <div class="stat-card">
                    <i class="fas fa-door-open"></i>
                    <span class="stat-value" id="stat-rooms">0</span>
                    <span class="stat-label">Active Rooms</span>
                </div>
                <div class="stat-card">
                    <i class="fas fa-code-branch"></i>
                    <span class="stat-value" id="stat-challenges">0</span>
                    <span class="stat-label">Total Challenges</span>
                </div>
                <div class="stat-card">
                    <i class="fas fa-users"></i>
                    <span class="stat-value" id="stat-players">0</span>
                    <span class="stat-label">Total Players</span>
                </div>
            </div>
        </div>
        
        <div class="login-right">
            <div class="form-tabs">
                <button class="form-tab active" data-form="login">LOGIN</button>
                <button class="form-tab" data-form="register">REGISTER</button>
            </div>
            
            <form id="login-form" class="auth-form active">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="login-username" placeholder="Username" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="login-password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn-primary">ENTER THE ARENA <i class="fas fa-arrow-right"></i></button>
                <div class="social-login-block">
                    <div class="auth-divider"><span>or</span></div>
                    {% if google_oauth_enabled %}
                    <a class="social-login-btn google-login" href="{{ url_for('google_login') }}">
                        <i class="fab fa-google"></i> Continue with Google
                    </a>
                    {% else %}
                    <button class="social-login-btn google-login" type="button" disabled title="Set GOOGLE_CLIENT_ID and GOOGLE_CLIENT_SECRET to enable Google login">
                        <i class="fab fa-google"></i> Google login not configured
                    </button>
                    {% endif %}
                </div>
            </form>

            <form id="two-factor-login-form" class="auth-form {% if pending_two_factor %}active{% endif %}">
                <div class="input-group">
                    <i class="fas fa-shield-halved"></i>
                    <input type="text" id="login-2fa-code" placeholder="6-digit verification code" inputmode="numeric" maxlength="6" autocomplete="one-time-code" required>
                </div>
                <button type="submit" class="btn-primary">VERIFY LOGIN <i class="fas fa-check"></i></button>
                <button type="button" class="btn-secondary" id="back-to-login-btn">Back to login</button>
            </form>
            
            <form id="register-form" class="auth-form">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="reg-username" placeholder="Username" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="reg-password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn-primary">CREATE ACCOUNT <i class="fas fa-user-plus"></i></button>
            </form>
        </div>
    </div>
</div>

<script>
async function loadStats() {
    try {
        const res = await fetch('/room/list');
        const rooms = await res.json();
        document.getElementById('stat-rooms').textContent = rooms.length || 0;
    } catch(e) {}
    
    try {
        const res = await fetch('/api/leaderboard');
        const players = await res.json();
        document.getElementById('stat-players').textContent = players.length || 0;
    } catch(e) {}
    
    document.getElementById('stat-challenges').textContent = "{{ challenge_count|default(0) }}";
}

loadStats();

document.querySelectorAll('.form-tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.form-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(`${tab.dataset.form}-form`).classList.add('active');
    });
});

function showAuthForm(formId) {
    document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
    document.getElementById(formId)?.classList.add('active');
    document.querySelectorAll('.form-tab').forEach(t => t.classList.remove('active'));
    const tabName = formId === 'register-form' ? 'register' : 'login';
    document.querySelector(`[data-form="${tabName}"]`)?.classList.add('active');
}

{% if pending_two_factor %}
showAuthForm('two-factor-login-form');
{% endif %}

document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const response = await fetch('/auth/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            username: document.getElementById('login-username').value,
            password: document.getElementById('login-password').value
        })
    });
    const data = await response.json();
    if (data.success) {
        window.location.href = data.role === 'admin' ? '/admin' : '/dashboard';
    } else if (data.requires_2fa) {
        showAuthForm('two-factor-login-form');
        document.getElementById('login-2fa-code').focus();
        showToast(data.message || 'Enter your verification code', 'info');
    } else {
        showToast(data.error || 'Invalid credentials', 'error');
    }
});

document.getElementById('two-factor-login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const response = await fetch('/auth/2fa/verify-login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({code: document.getElementById('login-2fa-code').value})
    });
    const data = await response.json();
    if (data.success) {
        window.location.href = data.role === 'admin' ? '/admin' : '/dashboard';
    } else {
        showToast(data.error || 'Invalid verification code', 'error');
    }
});

document.getElementById('back-to-login-btn').addEventListener('click', () => {
    showAuthForm('login-form');
});

document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const response = await fetch('/auth/register', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            username: document.getElementById('reg-username').value,
            password: document.getElementById('reg-password').value
        })
    });
    const data = await response.json();
    if (data.success) {
        window.location.href = data.role === 'admin' ? '/admin' : '/dashboard';
    } else {
        showToast(data.error || 'Registration failed', 'error');
    }
});
</script>
{% endblock %}
